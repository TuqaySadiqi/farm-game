<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Farm Game</title>

<style>
body{
    margin:0;
    font-family:Arial;
    overflow-x:hidden;
    background:linear-gradient(#87ceeb,#6ecb63);
    text-align:center;
}

/* MOVING CLOUDS */

.cloud{
    position:absolute;
    top:20px;
    width:120px;
    height:60px;
    background:white;
    border-radius:50px;
    opacity:0.8;
    animation:cloudMove 30s linear infinite;
}

.cloud:before,
.cloud:after{
    content:"";
    position:absolute;
    background:white;
    width:70px;
    height:70px;
    border-radius:50%;
}

.cloud:before{ top:-30px; left:10px; }
.cloud:after{ top:-20px; right:10px; }

.cloud2{ top:80px; animation-duration:45s; }

@keyframes cloudMove{
    from{ transform:translateX(-200px); }
    to{ transform:translateX(110vw); }
}

/* LOADING */

#loading-screen{
    position:fixed;
    width:100%;
    height:100%;
    background:#4CAF50;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    z-index:9999;
}

.spinner{
    width:60px;
    height:60px;
    border:6px solid rgba(255,255,255,0.3);
    border-top:6px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:20px;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.progress{
    width:200px;
    height:10px;
    background:rgba(255,255,255,0.3);
    border-radius:10px;
    overflow:hidden;
}

#progress-bar{
    width:0%;
    height:100%;
    background:white;
}

/* UI */

.top{
    color:white;
    font-size:18px;
    padding:10px;
}

.farm{
    display:grid;
    grid-template-columns:repeat(2,150px);
    gap:20px;
    justify-content:center;
    margin-top:20px;
}

/* REAL FARM FIELD DESIGN */

.field{
    width:150px;
    height:150px;
    border-radius:20px;
    background:
      repeating-linear-gradient(
        45deg,
        #7a4b20,
        #7a4b20 10px,
        #8b5a2b 10px,
        #8b5a2b 20px
      );
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    color:white;
    box-shadow:0 6px 12px rgba(0,0,0,0.3);
    position:relative;
}

.locked{
    background:gray;
}

/* COIN ANIMATION */

.coinFly{
    position:absolute;
    font-size:22px;
    animation:coinFly 1s ease-out forwards;
}

@keyframes coinFly{
    0%{ transform:translateY(0); opacity:1; }
    100%{ transform:translateY(-80px); opacity:0; }
}
</style>
</head>

<body>

<div class="cloud"></div>
<div class="cloud cloud2"></div>

<div id="loading-screen">
    <div class="spinner"></div>
    <h2>Farm yüklənir...</h2>
    <div class="progress">
        <div id="progress-bar"></div>
    </div>
</div>

<div class="top">
<span onclick="openProfile()" style="cursor:pointer">
👤 Profile
</span>
<br>
Coin: <span id="coin">0</span> |
Level: <span id="level">1</span>
</div>

<div class="farm" id="farm"></div>

<script>
function openProfile(){
    document.getElementById("profileBox").style.display="flex";
    document.getElementById("pLevel").innerText=level;
    document.getElementById("pCoin").innerText=coin;
}

function closeProfile(){
    document.getElementById("profileBox").style.display="none";
}
    
/* LOAD SAVE */

let coin = localStorage.getItem("coin") ? parseInt(localStorage.getItem("coin")) : 0;
let level = localStorage.getItem("level") ? parseInt(localStorage.getItem("level")) : 1;

let fields = localStorage.getItem("fields") ?
JSON.parse(localStorage.getItem("fields")) :
[
 {open:true, ready:false},
 {open:false},
 {open:false},
 {open:false}
];

function saveGame(){
    localStorage.setItem("coin",coin);
    localStorage.setItem("level",level);
    localStorage.setItem("fields",JSON.stringify(fields));
}

/* RENDER */

function renderFarm(){
    const farm=document.getElementById("farm");
    farm.innerHTML="";

    fields.forEach((f,index)=>{
        let div=document.createElement("div");
        div.classList.add("field");

        if(!f.open){
            div.classList.add("locked");
            div.innerText="🔒";
            div.onclick=()=>unlockField(index);
        }
        else if(f.ready){
            div.innerText="🌾";
            div.onclick=()=>harvest(index,div);
        }
        else{
            div.innerText="🌱";
            div.onclick=()=>plant(index);
        }

        farm.appendChild(div);
    });

    document.getElementById("coin").innerText=coin;
    document.getElementById("level").innerText=level;
}

/* GAME */

function plant(id){
    if(!fields[id].open) return;

    fields[id].ready=false;
    renderFarm();

    setTimeout(()=>{
        fields[id].ready=true;
        renderFarm();
        saveGame();
    },3000);
}

function harvest(id,element){

    coin+=10;
    fields[id].ready=false;

    if(coin>=level*50) level++;

    coinAnimation(element);

    renderFarm();
    saveGame();
}

function unlockField(id){
    let cost=(id+1)*50;

    if(level>=id+1 && coin>=cost){
        coin-=cost;
        fields[id].open=true;
        saveGame();
        renderFarm();
    }else{
        alert("Level və ya coin çatmır!");
    }
}

/* COIN FLY EFFECT */

function coinAnimation(el){
    let coinEl=document.createElement("div");
    coinEl.innerText="💰+10";
    coinEl.className="coinFly";
    el.appendChild(coinEl);

    setTimeout(()=>coinEl.remove(),1000);
}

/* LOADING */

window.addEventListener("load",()=>{
    let progress=0;
    let interval=setInterval(()=>{
        progress+=5;
        document.getElementById("progress-bar").style.width=progress+"%";

        if(progress>=100){
            clearInterval(interval);
            setTimeout(()=>{
                document.getElementById("loading-screen").style.display="none";
            },500);
        }
    },60);
});

renderFarm();

</script>

</body>
</html>
