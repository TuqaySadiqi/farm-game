<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Farm Game</title>

<style> #loading-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#6ecb63;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.loader-box{
    text-align:center;
    color:white;
}

.spinner{
    width:60px;
    height:60px;
    border:6px solid rgba(255,255,255,0.3);
    border-top:6px solid white;
    border-radius:50%;
    margin:0 auto 20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

.progress{
    width:200px;
    height:10px;
    background:rgba(255,255,255,0.3);
    border-radius:10px;
    overflow:hidden;
    margin-top:15px;
}

#progress-bar{
    width:0%;
    height:100%;
    background:white;
}

    
body <div id="loading-screen">
    <div class="loader-box">
        <div class="spinner"></div>
        <h2>Farm Game yüklənir...</h2>
        <div class="progress">
            <div id="progress-bar"></div>
        </div>
    </div>
</div>

      
    font-family: Arial;
    text-align: center;
    background: #87ceeb;
}

h1 {
    color: white;
}

.farm {
    width: 200px;
    height: 200px;
    background: brown;
    margin: 20px auto;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>Coin: <span id="coin">0</span></h1>

<div class="farm" id="farm">
    Boş torpaq
</div>

<button onclick="plant()">Ək</button>
<button onclick="harvest()">Topla</button>

<script>
let progress = 0;

let loadingInterval = setInterval(() => {
    progress += 5;
    document.getElementById("progress-bar").style.width = progress + "%";

    if(progress >= 100){
        clearInterval(loadingInterval);

        document.getElementById("loading-screen").style.opacity = "0";

        setTimeout(()=>{
            document.getElementById("loading-screen").style.display = "none";
        },500);
    }
},100);
    
function plant(){
    document.getElementById("farm").innerText = "Əkilir...";
    ready = false;

    setTimeout(()=>{
        ready = true;
        document.getElementById("farm").innerText = "Hazırdır 🌾";
    }, 5000);
}

function harvest(){
    if(ready){
        coin += 10;
        document.getElementById("coin").innerText = coin;
        document.getElementById("farm").innerText = "Boş torpaq";
        ready = false;
    }
}
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Farm Game</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#6ecb63;
}

.top{
    color:white;
    font-size:20px;
    margin:10px;
}

.farm{
    display:grid;
    grid-template-columns:repeat(2,120px);
    gap:15px;
    justify-content:center;
    margin-top:20px;
}

.field{
    width:120px;
    height:120px;
    background:brown;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:white;
}
.locked{
    background:gray;
}
button{
    margin-top:10px;
    padding:10px 20px;
}
</style>
</head>

<body>

<div class="top">
Coin: <span id="coin">0</span> |
Level: <span id="level">1</span>
</div>

<div class="farm">
    <div class="field" onclick="plant(0)">🌱</div>
    <div class="field locked" onclick="unlock(1)">🔒</div>
    <div class="field locked" onclick="unlock(2)">🔒</div>
    <div class="field locked" onclick="unlock(3)">🔒</div>
</div>

<script>
let coin = 0;
let level = 1;

let fields = [
 {open:true, ready:false},
 {open:false},
 {open:false},
 {open:false}
];

function plant(id){
 if(!fields[id].open) return;

 fields[id].ready=false;
 event.target.innerText="🌱";

 setTimeout(()=>{
   fields[id].ready=true;
   event.target.innerText="🌾";
 },3000);
}

function unlock(id){
 if(fields[id].open) return;

 if(coin>=50){
   coin-=50;
   fields[id].open=true;
   event.target.classList.remove("locked");
   event.target.innerText="🌱";
   update();
 } else {
   alert("Coin çatmır");
 }
}

document.addEventListener("click",function(e){
 if(e.target.innerText=="🌾"){
   coin+=10;
   e.target.innerText="🌱";
   update();
 }
});

function update(){
 document.getElementById("coin").innerText=coin;
 document.getElementById("level").innerText=level;
}
</script>

</body>
</html>
